name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
          - os: windows-latest
            platform: windows-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build renderer (Vite)
        run: bun x vite build

      - name: Build application (Electrobun)
        run: bun x electrobun build --env=canary

      # List every file in build/ to aid debugging if a packaging step fails.
      - name: List build outputs
        shell: bash
        run: find build -type f | sort

      # macOS: the distributable is a .dmg created by Electrobun.
      # Uses a while-read loop instead of mapfile to stay compatible with the
      # Bash 3.2 shipped on macOS GitHub Actions runners.
      - name: Package macOS distributable
        if: runner.os == 'macOS'
        run: |
          dmgs=()
          while IFS= read -r f; do
            dmgs+=("$f")
          done < <(find build -type f -name "*.dmg" | sort)
          if [ "${#dmgs[@]}" -ne 1 ]; then
            echo "Expected exactly one .dmg under build/, found ${#dmgs[@]}" >&2
            printf '%s\n' "${dmgs[@]}" >&2
            exit 1
          fi
          DMG="${dmgs[0]}"
          echo "Packaging: $DMG"
          cp "$DMG" "copilot-issue-tracker-${{ github.ref_name }}-${{ matrix.platform }}.dmg"

      # Linux: removed — only macOS and Windows are supported.

      # Windows: the distributable is a *-Setup-canary.zip installer package
      - name: Package Windows distributable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zips = Get-ChildItem -Path build -Recurse -Filter "*-Setup-canary.zip"
          if ($zips.Count -ne 1) {
            Write-Error "Expected exactly one *-Setup-canary.zip under build/, found $($zips.Count)"
            exit 1
          }
          $zip = $zips[0]
          Write-Host "Packaging: $($zip.FullName)"
          Copy-Item $zip.FullName `
            "copilot-issue-tracker-${{ github.ref_name }}-${{ matrix.platform }}.zip"

      - name: Upload distributable
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          # Glob captures the single file regardless of extension
          path: copilot-issue-tracker-${{ github.ref_name }}-${{ matrix.platform }}.*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all distributables
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

