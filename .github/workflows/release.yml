name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: windows-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build renderer (Vite)
        run: bun x vite build

      - name: Build application (Electrobun)
        run: bun x electrobun build --env=canary

      # macOS: the distributable is a .dmg created by Electrobun
      - name: Package macOS distributable
        if: runner.os == 'macOS'
        run: |
          DMG=$(find build -name "*.dmg" | head -1)
          echo "Packaging: $DMG"
          cp "$DMG" "copilot-issue-tracker-${{ github.ref_name }}-macos-arm64.dmg"

      # Linux: the distributable is a .tar.zst archive created by Electrobun
      - name: Package Linux distributable
        if: runner.os == 'Linux'
        run: |
          TAR=$(find build -name "*.tar.zst" | head -1)
          echo "Packaging: $TAR"
          cp "$TAR" "copilot-issue-tracker-${{ github.ref_name }}-linux-x64.tar.zst"

      # Windows: the distributable is a *-Setup-canary.zip installer package
      - name: Package Windows distributable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path build -Recurse -Filter "*-Setup-canary.zip" |
            Select-Object -First 1
          if (-not $zip) { throw "No *-Setup-canary.zip found under build/" }
          Write-Host "Packaging: $($zip.FullName)"
          Copy-Item $zip.FullName `
            "copilot-issue-tracker-${{ github.ref_name }}-windows-x64.zip"

      - name: Upload distributable
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          # Glob captures the single file regardless of extension
          path: copilot-issue-tracker-${{ github.ref_name }}-${{ matrix.platform }}.*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all distributables
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

